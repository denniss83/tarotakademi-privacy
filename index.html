<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarot Akademi — Yasal Bilgiler</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1A1A2E;
      color: #FFFFFF;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }
    h1 { color: #D4AF37; font-size: 28px; text-align: center; margin-bottom: 10px; letter-spacing: 2px; }
    p.subtitle { color: #ffffff99; font-size: 15px; text-align: center; max-width: 500px; line-height: 1.7; margin-bottom: 40px; }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .card {
      background: #16213E;
      border: 1.5px solid #D4AF37;
      border-radius: 16px;
      padding: 30px 40px;
      text-align: center;
      text-decoration: none;
      color: #FFFFFF;
      width: 220px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(212,175,55,0.25); }
    .card .icon { font-size: 36px; margin-bottom: 12px; }
    .card .label { font-size: 15px; color: #D4AF37; font-weight: bold; letter-spacing: 1px; }
    footer { margin-top: 60px; color: #ffffff44; font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <h1>✨ TAROT AKADEMİ</h1>
  <p class="subtitle">
    Tarot Akademi; tarot açılımları, astrolojik yorumlar ve spiritüel rehberlik içerikleri sunan
    bir eğlence ve kişisel gelişim uygulamasıdır.
  </p>
  <div class="cards">
    <a class="card" href="gizlilik-politikasi.html">
      <div class="icon">🔒</div>
      <div class="label">GİZLİLİK POLİTİKASI</div>
    </a>
    <a class="card" href="kullanim-kosullari.html">
      <div class="icon">📜</div>
      <div class="label">KULLANIM KOŞULLARI</div>
    </a>
  </div>
  <footer>© 2026 Tarot Akademi. Tüm hakları saklıdır.</footer>
</body>
</html>
